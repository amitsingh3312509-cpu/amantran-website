
<!DOCTYPE html>
<html>
<head>
<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial; background:#f5f5f5;}
.box{max-width:550px; margin:auto; background:white; padding:20px; border-radius:10px;}
h2{text-align:center; color:red;}
input,select{width:100%; padding:10px; margin:6px 0;}
button{width:100%; padding:12px; background:green; color:white; border:none; margin-top:8px; cursor:pointer;}
.cart{background:#f2f2f2; padding:10px; margin-top:10px; border-radius:8px;}
.info{text-align:center; font-size:18px; color:green;}
.qr{text-align:center; margin-top:15px;}
.note{color:blue; font-size:14px; text-align:center; margin-top:10px;}
</style>
</head>

<body>
<div class="box">
<h2>🍕 Royal Pizza Home</h2>

<form action="https://formsubmit.co/YOURGMAIL@gmail.com" method="POST" onsubmit="return checkPayment()">

<label>Name / नाम</label>
<input type="text" name="Name" id="name" required>

<label>Mobile / मोबाइल</label>
<input type="number" name="Mobile" id="mobile" required>

<label>Village / गाँव</label>
<input type="text" name="Village" id="village">

<label>Select Pizza / पिज़्ज़ा चुनें</label>
<select id="pizza">
<option value="">Select</option>
<option value="150">Margherita Pizza ₹150</option>
<option value="180">Veg Pizza ₹180</option>
<option value="200">Paneer Pizza ₹200</option>
<option value="250">Farmhouse Pizza ₹250</option>
</select>

<label>Quantity / मात्रा</label>
<input type="number" id="qty" value="1" min="1">

<button type="button" onclick="addCart()">Add To Cart / कार्ट में जोड़ें</button>

<div class="cart">
<h3>Cart / कार्ट</h3>
<div id="cart"></div>
</div>

<div class="info">Total ₹ <span id="total">0</span></div>
<div class="info">Advance 50% ₹ <span id="advance">0</span></div>
<div class="info">Receipt No : <span id="receipt"></span></div>
<div class="info">Date : <span id="date"></span></div>
<div class="info">Time : <span id="time"></span></div>
<div class="info">Day : <span id="day"></span></div>

<input type="hidden" name="TotalAmount" id="totalInput">
<input type="hidden" name="AdvancePaid" id="advanceInput">
<input type="hidden" name="ReceiptNo" id="receiptInput">

<button type="button" onclick="pay()">Pay Advance / अग्रिम भुगतान करें</button>

<div class="qr">
<p>Click QR To Pay / QR दबाकर भुगतान करें</p>
<a id="paylink" target="_blank">
<img id="qrimg" width="200">
</a>
</div>

<div class="note">
🔹 कृपया Pay Advance दबाने के बाद Payment App में Payment Complete करें। <br>
🔹 Payment complete होने के बाद Submit Order दबाएं।
</div>

<button type="submit">Submit Order / ऑर्डर भेजें</button>
</form>

<button onclick="downloadReceipt()">Download Receipt / रसीद डाउनलोड करें</button>

</div>

<script>
let total=0;
let paid=false;

function addCart(){
let pizza=document.getElementById("pizza");
let price=pizza.value;
let name=pizza.options[pizza.selectedIndex].text;
let qty=document.getElementById("qty").value;
let itemTotal=price*qty;
if(itemTotal==0){ alert("Select pizza first / पिज़्ज़ा चुनें"); return; }
total+=itemTotal;
document.getElementById("cart").innerHTML+=name+" x "+qty+" = ₹"+itemTotal+"<br>";
document.getElementById("total").innerText=total;
let adv=Math.round(total/2);
document.getElementById("advance").innerText=adv;
document.getElementById("totalInput").value=total;
document.getElementById("advanceInput").value=adv;

// Boosted UPI payment link
let upi="upi://pay?pa=7309277213@upi&pn=RoyalPizzaHome&am="+adv+"&cu=INR&tn=Royal Pizza Advance Payment";
let qr="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(upi);
document.getElementById("qrimg").src=qr;
document.getElementById("paylink").href=upi;
}

function pay(){
let adv=document.getElementById("advance").innerText;
if(adv==0){ alert("Add pizza first / पिज़्ज़ा जोड़ें"); return; }
let upi="upi://pay?pa=7309277213@upi&pn=RoyalPizzaHome&am="+adv+"&cu=INR&tn=Royal Pizza Advance Payment";
window.location.href=upi;
paid=true;
alert("Payment app open हो गया है। कृपया UPI PIN डालकर payment complete करें। Payment के बाद Submit Order दबाएं।");
}

function checkPayment(){
if(!paid){ alert("Please pay advance first / कृपया अग्रिम भुगतान करें"); return false; }
document.getElementById("receiptInput").value=document.getElementById("receipt").innerText;
return true;
}

function setTime(){
let d=new Date();
document.getElementById("date").innerText=d.toLocaleDateString();
document.getElementById("time").innerText=d.toLocaleTimeString();
document.getElementById("day").innerText=d.toLocaleDateString('en-US',{weekday:'long'});
document.getElementById("receipt").innerText="RP"+Math.floor(Math.random()*100000);
}
setTime();

function downloadReceipt(){
let text="Royal Pizza Receipt\n\n"+
"Name: "+document.getElementById("name").value+"\n"+
"Mobile: "+document.getElementById("mobile").value+"\n"+
"Village: "+document.getElementById("village").value+"\n"+
"Total: ₹"+total+"\n"+
"Advance Paid: ₹"+document.getElementById("advance").innerText+"\n"+
"Receipt No: "+document.getElementById("receipt").innerText+"\n"+
"Date: "+document.getElementById("date").innerText+"\n"+
"Time: "+document.getElementById("time").innerText+"\n";
let blob=new Blob([text],{type:"text/plain"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="pizza_receipt.txt";
link.click();
}
</script>
</body>
  </html>
